name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: invoiceflow
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      INVOICEFLOW_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/invoiceflow
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .[dev]
      - run: pytest --cov=src/invoiceflow -v
      - run: ruff check src/
      - run: mypy src/invoiceflow/ --ignore-missing-imports
      - run: bandit -r src/invoiceflow/ -q  # security
